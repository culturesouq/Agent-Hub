<svg xmlns="http://www.w3.org/2000/svg" width="340" height="104" viewBox="0 0 340 104">
<defs>
  <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a0a2e"/>
    <stop offset="100%" stop-color="#0a0a12"/>
  </radialGradient>
  <radialGradient id="core2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8c8ff"/>
    <stop offset="60%" stop-color="#cd96ff"/>
    <stop offset="100%" stop-color="#9b5fd4"/>
  </radialGradient>
  <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#40cef3" stop-opacity=".35"/>
    <stop offset="100%" stop-color="#40cef3" stop-opacity="0"/>
  </radialGradient>
  <filter id="f1"><feGaussianBlur stdDeviation="2.5"/></filter>
  <filter id="f2"><feGaussianBlur stdDeviation="7"/></filter>
  <style>
    @keyframes pulse1 { 0%,100%{r:22px;opacity:.15} 50%{r:36px;opacity:0} }
    @keyframes pulse2 { 0%,100%{r:14px;opacity:.25} 50%{r:26px;opacity:0} }
    @keyframes pulse3 { 0%,100%{r:6px;opacity:.9} 50%{r:9px;opacity:.6} }
    @keyframes rotate { to{transform:rotate(360deg)} }
    @media (prefers-reduced-motion: no-preference) {
      .p1{animation:pulse1 3s ease-out infinite}
      .p2{animation:pulse2 3s ease-out infinite .6s}
      .p3{animation:pulse3 3s ease-in-out infinite}
      .arc{animation:rotate 12s linear infinite;transform-origin:52px 52px}
    }
  </style>
</defs>

<rect width="340" height="104" rx="16" fill="url(#bg2)"/>
<circle cx="52" cy="52" r="36" fill="url(#glow2)" filter="url(#f2)"/>
<circle class="p1" cx="52" cy="52" r="22" fill="none" stroke="#cd96ff" stroke-width="1"/>
<circle class="p2" cx="52" cy="52" r="14" fill="none" stroke="#40cef3" stroke-width="1.2"/>
<g class="arc">
  <path d="M52 22 A30 30 0 0 1 82 52" fill="none" stroke="#cd96ff" stroke-width="1" stroke-linecap="round" opacity=".5"/>
  <path d="M52 82 A30 30 0 0 1 22 52" fill="none" stroke="#40cef3" stroke-width="1" stroke-linecap="round" opacity=".5"/>
</g>
<circle cx="52" cy="52" r="10" fill="url(#core2)" filter="url(#f1)"/>
<circle class="p3" cx="52" cy="52" r="6" fill="#f0e0ff"/>
<line x1="100" y1="28" x2="100" y2="76" stroke="#cd96ff" stroke-width="0.5" opacity="0.3"/>
<text x="118" y="60" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="-1" fill="#f3eff5">Op<tspan fill="#cd96ff">Soul</tspan></text>
</svg>
