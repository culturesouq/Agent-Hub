kind = "web"
previewPath = "/"
title = "OpSoul Hub"
version = "1.0.0"
id = "artifacts/opsoul-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19165

[services.development]
run = "pnpm --filter @workspace/opsoul-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opsoul-hub", "run", "build" ]
run = "pnpm --filter @workspace/opsoul-api run start"

[services.env]
PORT = "19165"
BASE_PATH = "/"
NODE_ENV = "production"
